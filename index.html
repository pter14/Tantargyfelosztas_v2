<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Tantárgyfelosztás — Tantárgyak (teszt)</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body{font-family:Arial,Helvetica,sans-serif;margin:18px;background:#f6f7fb;color:#111}
    .card{background:#fff;padding:14px;border-radius:8px;box-shadow:0 1px 6px rgba(0,0,0,0.06);max-width:900px}
    input,button{padding:8px;border-radius:6px;border:1px solid #ddd}
    button{cursor:pointer;background:#fff}
    .list{margin-top:12px}
    .item{display:flex;justify-content:space-between;align-items:center;padding:8px 6px;border-bottom:1px solid #f1f1f1}
    .muted{color:#666;font-size:0.95rem}
  </style>
</head>
<body>
  <div class="card">
    <h2>Tantárgyak — egyszerű teszt</h2>
    <p class="muted">Csak tantárgyak hozzáadása és törlése. Azonosító automatikusan jön az első 4 karakterből.</p>

    <div style="display:flex;gap:8px;margin-top:8px">
      <input id="subjectName" placeholder="Tantárgy neve (pl. Matematika)" style="flex:1" />
      <button id="addBtn">+ Tantárgy</button>
    </div>

    <div style="margin-top:12px">
      <button id="exportBtn">Export JSON</button>
      <button id="loadSampleBtn">Minták betöltése</button>
    </div>

    <div class="list" id="subjectsList" aria-live="polite" style="margin-top:12px">
      <!-- lista ide kerül -->
    </div>
  </div>

<script>
/* Minimal subject manager
   - addSubject()
   - deleteSubject()
   - renderSubjects()
   - makeIdFromName() (4 char, ascii, collision handling)
*/

const store = { subjects: [] };

function sanitizeNameForId(name){
  // remove accents, non-alnum, lowercase
  const s = name.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  return s.toLowerCase().replace(/[^a-z0-9]/g,'');
}
function makeIdFromName(name, len=4){
  const alpha = sanitizeNameForId(name);
  let id = alpha.slice(0,len) || alpha || 'sub';
  // avoid collisions by adding suffix _1, _2...
  const base = id;
  let i = 1;
  while(store.subjects.some(s => s.subject_id === id)){
    id = `${base}_${i}`;
    i++;
  }
  return id;
}

function renderSubjects(){
  const list = document.getElementById('subjectsList');
  list.innerHTML = '';
  if(store.subjects.length === 0){
    list.innerHTML = '<div class="muted">Még nincs tantárgy. Adj hozzá egyet fent.</div>';
    return;
  }
  store.subjects.forEach((s, idx) => {
    const row = document.createElement('div');
    row.className = 'item';
    const left = document.createElement('div');
    left.innerHTML = `<strong>${escapeHtml(s.display_name)}</strong> <span class="muted">(${s.subject_id})</span>`;
    const right = document.createElement('div');
    const del = document.createElement('button');
    del.textContent = 'Törlés';
    del.onclick = () => { if(confirm('Biztos törlöd a tantárgyat?')) { deleteSubject(s.subject_id); } };
    right.appendChild(del);
    row.appendChild(left);
    row.appendChild(right);
    list.appendChild(row);
  });
}

function addSubject(){
  const inp = document.getElementById('subjectName');
  const name = (inp.value || '').trim();
  if(!name){
    alert('Adj meg egy tantárgy nevet!');
    return;
  }
  const id = makeIdFromName(name);
  store.subjects.push({ subject_id: id, display_name: name });
  inp.value = '';
  renderSubjects();
}

// remove by id
function deleteSubject(subjectId){
  store.subjects = store.subjects.filter(s => s.subject_id !== subjectId);
  renderSubjects();
}

/* small helper: escape HTML when inserting user text */
function escapeHtml(text){
  return (text+'').replace(/[&<>"']/g, function(m){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]); });
}

/* export current subjects to JSON download */
function exportSubjects(){
  const blob = new Blob([JSON.stringify(store.subjects, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'subjects.json'; a.click(); URL.revokeObjectURL(url);
}

/* load a small sample set for manual testing */
function loadSample(){
  store.subjects = [
    {subject_id: makeIdFromName('Matematika'), display_name: 'Matematika'},
    {subject_id: makeIdFromName('Magyar'), display_name: 'Magyar'},
    {subject_id: makeIdFromName('Angol'), display_name: 'Angol'}
  ];
  renderSubjects();
}

/* init */
document.getElementById('addBtn').addEventListener('click', addSubject);
document.getElementById('exportBtn').addEventListener('click', exportSubjects);
document.getElementById('loadSampleBtn').addEventListener('click', loadSample);
document.getElementById('subjectName').addEventListener('keydown', function(e){
  if(e.key === 'Enter'){ addSubject(); }
});

/* render initially */
renderSubjects();

</script>
</body>
</html>
