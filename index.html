<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Tantárgyfelosztás — Solver & Összes sor</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body{font-family:Arial,Helvetica,sans-serif;margin:18px;background:#f6f7fb;color:#111}
    .container{display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:1400px}
    .card{background:#fff;padding:14px;border-radius:8px;box-shadow:0 1px 6px rgba(0,0,0,0.06)}
    input,button,select,textarea{padding:8px;border-radius:6px;border:1px solid #ddd}
    button{cursor:pointer;background:#fff}
    .list{margin-top:12px}
    .item{display:flex;justify-content:space-between;align-items:center;padding:8px 6px;border-bottom:1px solid #f1f1f1}
    .muted{color:#666;font-size:0.95rem}
    .small{font-size:0.9rem;color:#666}
    .chip{display:inline-block;background:#f1f5f9;padding:6px 8px;border-radius:6px;margin:3px}
    .groupsBox{margin-top:6px}
    .groupItem{display:inline-block;background:#eef2ff;padding:6px 8px;border-radius:6px;margin:3px}
    table{border-collapse:collapse;width:100%}
    th,td{border:1px solid #eee;padding:6px;text-align:left;vertical-align:middle;word-break:break-word}
    .csr-wrapper{overflow:auto;border:1px solid #eef2f7;padding:6px;border-radius:6px}
    .csr-table{min-width:900px;border-collapse:collapse;table-layout:auto}
    .csr-table th:first-child,
    .csr-table td:first-child{
      min-width:260px;
      max-width:420px;
      white-space:normal;
      word-break:break-word;
      padding:10px;
      position:sticky;
      left:0;
      background:#fff;
      z-index:3;
    }
    .csr-table th, .csr-table td{white-space:nowrap}
    .csr-table td input[type=number]{ width:110px }
    .teacher-row{border-top:1px solid #eef2f7;padding-top:10px;padding-bottom:10px}
    .teacher-meta{display:flex;justify-content:space-between;align-items:center}
    .teacher-controls{margin-top:8px;display:flex;gap:8px;flex-wrap:wrap}
    .subject-checkboxes{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}
    .fixed-list{margin-top:8px}
    .fixed-item{display:inline-block;background:#fff;border:1px solid #e6e6e6;padding:6px 8px;border-radius:6px;margin:4px}
    .muted-button{background:#fff;border:1px solid #ddd;padding:6px;border-radius:6px;cursor:pointer}
    .warning{color:#b91c1c;font-weight:600}
    .result-area{margin-top:12px;padding:12px;background:#fff;border-radius:8px;border:1px solid #eee}
    .ok{color:green;font-weight:600}
    .bad{color:#b91c1c;font-weight:700}
  </style>
</head>
<body>
  <h1>Tantárgyfelosztás — Solver (greedy) + Összes sor</h1>
  <p class="small">Most: Magántanulók azonosítói M1/M2. Az összegző táblázat alján új "Összes" sor van. A Solve gomb lefuttat egy egyszerű greedy kiosztót.</p>

  <div class="container">
    <div class="card" id="subjectsCard">
      <h3>Tantárgyak</h3>
      <div style="display:flex;gap:8px">
        <input id="subjectName" placeholder="Tantárgy neve (pl. Matematika)" />
        <button id="addSubjectBtn">+ Tantárgy</button>
      </div>
      <div style="margin-top:8px;display:flex;gap:8px">
        <button id="exportSubjectsBtn">Export tantárgy</button>
        <button id="importSubjectsBtn">Import tantárgy</button>
        <input id="fileInputSubjects" type="file" accept=".json,application/json" style="display:none" />
      </div>
      <div id="subjectsList" class="list"></div>
    </div>

    <div class="card" id="classesCard">
      <h3>Osztályok</h3>
      <div style="display:flex;gap:8px">
        <input id="newClassDisplay" placeholder="Új osztály megnevezése (pl. 1.b)" />
        <button id="addClassBtn">+ Osztály</button>
      </div>
      <div id="classesList" class="list" style="margin-top:8px"></div>
    </div>

    <div class="card" id="teachersCard" style="grid-column:1 / span 2;">
      <h3>Tanárok</h3>
      <div style="display:flex;gap:8px">
        <input id="teacherName" placeholder="Tanár neve (pl. Kovács Anna)" style="flex:1" />
        <input id="teacherHours" placeholder="Heti óra" type="number" style="width:120px" />
        <button id="addTeacherBtn">+ Tanár</button>
      </div>
      <div style="margin-top:8px;display:flex;gap:8px">
        <button id="exportTeachersBtn">Export Tanárok</button>
        <button id="importTeachersBtn">Import Tanárok</button>
        <input id="fileInputTeachers" type="file" accept=".json,application/json" style="display:none" />
      </div>
      <div id="teachersList" class="list" style="margin-top:12px"></div>
    </div>

    <div class="card" style="grid-column:1 / -1">
      <h3>CSR (osztály × tantárgy)</h3>
      <div style="display:flex;gap:8px;align-items:center">
        <button id="exportCsrBtn">Export CSR</button>
        <button id="importCsrBtn">Import CSR</button>
        <input id="fileInputCsr" type="file" accept=".json,application/json" style="display:none" />
        <button id="solveBtn" style="margin-left:16px">Solve (Greedy)</button>
        <div class="muted" style="margin-left:10px">A bal oszlop nagyobb — görgess jobbra a részletekhez.</div>
      </div>

      <div class="csr-wrapper" style="margin-top:8px">
        <table id="csrTable" class="csr-table"></table>
      </div>

      <div id="summaryBox" style="margin-top:8px"></div>

      <div id="solverResults" class="result-area" style="display:none"></div>
    </div>
  </div>

<script>
/* Full app + solver (greedy). Keep in sync with your store format */

document.addEventListener('DOMContentLoaded', ()=>{

  const store = { subjects: [], classes: [], csr: [], teachers: [] };

  // helpers
  const removeAccents = s => s.normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const makeSubjectId = name => {
    const a = removeAccents(name).toLowerCase().replace(/[^a-z0-9]/g,'');
    let id = a.slice(0,4) || a || 'sub';
    // avoid collision
    let i = 1; let base = id;
    while(store.subjects.some(s=>s.subject_id===id)){ id = `${base}_${i}`; i++; }
    return id;
  };
  const sanitizeClassId = display => {
    let s = (display||'').trim(); if(!s) return '';
    s = removeAccents(s).replace(/[.\s\-]+/g,'_').replace(/[^A-Za-z0-9_]/g,'').toUpperCase();
    s = s.replace(/_+/g,'_').replace(/^_+|_+$/g,'').replace(/([0-9])_([A-Za-z])/g,(m,p1,p2)=>p1+p2);
    return s || 'CLASS';
  };
  const makeTeacherId = name => {
    const parts = (name||'').trim().split(/\s+/).filter(Boolean);
    let id = parts.map(p=>p[0].toUpperCase()).join('') || 'T';
    let i=1; const base=id;
    while(store.teachers.some(t=>t.teacher_id===id)){ id = `${base}_${i}`; i++; }
    return id;
  };
  const el = id => document.getElementById(id);

  // initialize classes with M1/M2 for magántanulók
  function initDefaultClasses(){
    store.classes = [];
    for(let g=1; g<=8; g++) ['A','B'].forEach(s=> store.classes.push({class_id:`${g}${s}`, display_name:`${g}.${s.toLowerCase()}`, groups:[]}));
    store.classes.push({class_id:'M1', display_name:'Magántanuló 1', groups:[]});
    store.classes.push({class_id:'M2', display_name:'Magántanuló 2', groups:[]});
  }

  // rendering functions
  function renderSubjects(){
    const box = el('subjectsList'); box.innerHTML = '';
    if(store.subjects.length===0){ box.textContent='Nincsenek tantárgyak'; return; }
    store.subjects.forEach(s=>{
      const row = document.createElement('div'); row.className='item';
      row.innerHTML = `<div><strong>${s.display_name}</strong> <span class="muted">(${s.subject_id})</span></div>
                       <div><button data-id="${s.subject_id}" class="del-sub">Törlés</button></div>`;
      box.appendChild(row);
    });
    box.querySelectorAll('.del-sub').forEach(b=>b.addEventListener('click', ()=>{
      const id = b.getAttribute('data-id'); if(!confirm('Törlöd a tantárgyat?')) return;
      store.subjects = store.subjects.filter(x=>x.subject_id!==id);
      store.csr = store.csr.filter(x=>x.subject_id!==id);
      store.teachers.forEach(t=>{ t.subjects = (t.subjects||[]).filter(sid=>sid!==id); if(t.fixed) t.fixed = t.fixed.filter(f=>f.subject_id!==id); });
      renderSubjects(); renderCSR(); renderTeachers(); renderSummary();
    }));
  }

  function renderClasses(){
    const box = el('classesList'); box.innerHTML='';
    store.classes.forEach(c=>{
      const row = document.createElement('div'); row.className='item';
      row.innerHTML = `<div><strong>${c.display_name}</strong> <span class="muted">(${c.class_id})</span></div>
                       <div><button data-id="${c.class_id}" class="del-class">Törlés</button></div>`;
      box.appendChild(row);
    });
    box.querySelectorAll('.del-class').forEach(b=>b.addEventListener('click', ()=>{
      const id = b.getAttribute('data-id'); if(!confirm('Törlöd az osztályt?')) return;
      store.classes = store.classes.filter(x=>x.class_id!==id); store.csr = store.csr.filter(x=>x.class_id!==id);
      store.teachers.forEach(t=>{ if(t.fixed) t.fixed = t.fixed.filter(f=>f.class_id!==id); });
      renderClasses(); renderCSR(); renderTeachers(); renderSummary();
    }));
  }

  function renderTeachers(){
    const box = el('teachersList'); box.innerHTML='';
    if(store.teachers.length===0){ box.textContent='Nincsenek tanárok'; return; }
    store.teachers.forEach((t, idx)=>{
      const container = document.createElement('div'); container.className='teacher-row';
      const meta = document.createElement('div'); meta.className='teacher-meta';
      meta.innerHTML = `<div><strong>${t.teacher_id}</strong> — ${t.name} <span class="muted">(${t.weekly_hours||0} óra)</span></div>
                        <div><button data-id="${t.teacher_id}" class="del-teacher">Törlés</button></div>`;
      container.appendChild(meta);

      // subject checkboxes
      const subjBox = document.createElement('div'); subjBox.className='subject-checkboxes';
      store.subjects.forEach(s=>{
        const lab = document.createElement('label'); lab.style.cursor='pointer';
        const chk = document.createElement('input'); chk.type='checkbox'; chk.checked = (t.subjects||[]).includes(s.subject_id);
        chk.addEventListener('change', ()=>{ t.subjects = t.subjects || []; if(chk.checked){ if(!t.subjects.includes(s.subject_id)) t.subjects.push(s.subject_id); } else t.subjects = t.subjects.filter(x=>x!==s.subject_id); });
        lab.appendChild(chk); lab.appendChild(document.createTextNode(' ' + s.display_name));
        subjBox.appendChild(lab);
      });
      container.appendChild(subjBox);

      // fixed inline
      const fixedPanel = document.createElement('div'); fixedPanel.className='teacher-controls';
      const selSub = document.createElement('select'); store.subjects.forEach(s=>{ const o=document.createElement('option'); o.value=s.subject_id; o.textContent=`${s.display_name} (${s.subject_id})`; selSub.appendChild(o); });
      const selClass = document.createElement('select'); store.classes.forEach(c=>{ const o=document.createElement('option'); o.value=c.class_id; o.textContent=`${c.display_name} (${c.class_id})`; selClass.appendChild(o); });
      const inpHours = document.createElement('input'); inpHours.type='number'; inpHours.step='0.5'; inpHours.min=0; inpHours.placeholder='Óra'; inpHours.style.width='100px';
      const chkFull = document.createElement('input'); chkFull.type='checkbox'; const lblFull = document.createElement('label'); lblFull.style.marginLeft='6px'; lblFull.appendChild(chkFull); lblFull.appendChild(document.createTextNode(' Teljes CSR'));
      const btnAddFix = document.createElement('button'); btnAddFix.textContent = '+ Fix';
      btnAddFix.addEventListener('click', ()=>{
        const subject_id = selSub.value; const class_id = selClass.value;
        let hours = parseFloat(inpHours.value||'0') || 0; const full = !!chkFull.checked;
        if(full){ const rec = store.csr.find(x=>x.class_id===class_id && x.subject_id===subject_id); hours = rec ? Number(rec.hours_per_week||0) : 0; }
        if(!t.fixed) t.fixed = []; t.fixed.push({subject_id, class_id, hours, full});
        inpHours.value=''; chkFull.checked=false; renderTeachers();
      });
      fixedPanel.appendChild(selSub); fixedPanel.appendChild(selClass); fixedPanel.appendChild(inpHours); fixedPanel.appendChild(lblFull); fixedPanel.appendChild(btnAddFix);
      container.appendChild(fixedPanel);

      // fixed list
      const fixedList = document.createElement('div'); fixedList.className='fixed-list';
      if(!t.fixed || t.fixed.length===0){ fixedList.innerHTML = '<div class="muted">Nincs fix hozzárendelés</div>'; }
      else {
        t.fixed.forEach((f, fi)=>{
          const fdiv = document.createElement('span'); fdiv.className='fixed-item';
          fdiv.innerHTML = `${f.subject_id} @ ${f.class_id} — ${f.full ? 'teljes' : ((f.hours % 1 === 0) ? String(f.hours) : String(f.hours.toFixed(1)) )} <button data-teacher="${t.teacher_id}" data-fi="${fi}" class="del-fixed" style="margin-left:6px">x</button>`;
          fixedList.appendChild(fdiv);
        });
      }
      container.appendChild(fixedList);

      // delete handlers
      container.querySelectorAll('.del-teacher').forEach(b=>b.addEventListener('click', ()=>{
        const id = b.getAttribute('data-id'); if(!confirm('Törlöd a tanárt?')) return; store.teachers = store.teachers.filter(x=>x.teacher_id!==id); renderTeachers();
      }));
      container.querySelectorAll('.del-fixed').forEach(b=>b.addEventListener('click', ()=>{
        const tid = b.getAttribute('data-teacher'); const idx = parseInt(b.getAttribute('data-fi'),10);
        const tt = store.teachers.find(x=>x.teacher_id === tid);
        if(tt && tt.fixed){ tt.fixed.splice(idx,1); renderTeachers(); }
      }));

      el('teachersList').appendChild(container);
    });
  }

  function renderCSR(){
    const table = el('csrTable'); table.innerHTML='';
    if(store.subjects.length===0 || store.classes.length===0){ table.innerHTML = '<tr><td>Adj meg tantárgyakat és osztályokat</td></tr>'; return; }
    let html = '<thead><tr><th></th>';
    store.classes.forEach(c=> html += `<th>${c.class_id}</th>`);
    html += '</tr></thead><tbody>';
    store.subjects.forEach(s=>{
      html += `<tr><th>${s.display_name} (${s.subject_id})</th>`;
      store.classes.forEach(c=>{
        const rec = store.csr.find(x=>x.class_id===c.class_id && x.subject_id===s.subject_id);
        const v = rec ? Number(rec.hours_per_week||0) : 0;
        html += `<td><input type="number" step="0.5" min="0" data-class="${c.class_id}" data-sub="${s.subject_id}" value="${v}" /></td>`;
      });
      html += '</tr>';
    });
    html += '</tbody>';
    table.innerHTML = html;
    table.querySelectorAll('input[data-class]').forEach(inp=>{
      inp.style.width = '110px';
      inp.addEventListener('change', ()=>{
        const class_id = inp.getAttribute('data-class'); const subject_id = inp.getAttribute('data-sub');
        const val = parseFloat(inp.value || '0') || 0;
        const idx = store.csr.findIndex(x=>x.class_id===class_id && x.subject_id===subject_id);
        if(idx>=0) store.csr[idx].hours_per_week = val; else store.csr.push({class_id, subject_id, hours_per_week: val});
        renderSummary();
      });
    });
  }

  // summary with bottom totals row
  function renderSummary(){
    const box = el('summaryBox'); box.innerHTML=''; if(store.subjects.length===0 || store.classes.length===0){ box.textContent='Nincsenek adatok'; return; }
    const tbl = document.createElement('table');
    // header
    const thead = document.createElement('thead'); const thr = document.createElement('tr'); thr.appendChild(document.createElement('th'));
    store.classes.forEach(c=>{ const th=document.createElement('th'); th.textContent=c.class_id; thr.appendChild(th); });
    const thSum = document.createElement('th'); thSum.textContent='Összes'; thr.appendChild(thSum); thead.appendChild(thr); tbl.appendChild(thead);

    const tbody = document.createElement('tbody');
    // rows per subject
    store.subjects.forEach(s=>{
      const tr = document.createElement('tr'); const th = document.createElement('th'); th.textContent = `${s.display_name} (${s.subject_id})`; tr.appendChild(th);
      let rowSum = 0;
      store.classes.forEach(c=>{
        const rec = store.csr.find(x=>x.class_id===c.class_id && x.subject_id===s.subject_id);
        const v = rec ? Number(rec.hours_per_week||0) : 0; rowSum += v;
        const td = document.createElement('td'); td.textContent = (v % 1 === 0) ? String(v) : String(v.toFixed(1)); tr.appendChild(td);
      });
      const tdTotal = document.createElement('td'); tdTotal.textContent = (rowSum % 1 === 0) ? String(rowSum) : String(rowSum.toFixed(1)); tr.appendChild(tdTotal);
      tbody.appendChild(tr);
    });

    // bottom totals row (sum each column and grand total)
    const trTotals = document.createElement('tr'); const thTotals = document.createElement('th'); thTotals.textContent = 'Összes'; trTotals.appendChild(thTotals);
    let grandTotal = 0;
    store.classes.forEach(c=>{
      let colSum = 0;
      store.subjects.forEach(s=>{
        const rec = store.csr.find(x=>x.class_id===c.class_id && x.subject_id===s.subject_id);
        const v = rec ? Number(rec.hours_per_week||0) : 0; colSum += v;
      });
      grandTotal += colSum;
      const td = document.createElement('td'); td.textContent = (colSum % 1 === 0) ? String(colSum) : String(colSum.toFixed(1)); trTotals.appendChild(td);
    });
    const tdGrand = document.createElement('td'); tdGrand.textContent = (grandTotal % 1 === 0) ? String(grandTotal) : String(grandTotal.toFixed(1)); trTotals.appendChild(tdGrand);

    tbl.appendChild(tbody); tbl.appendChild(trTotals); box.appendChild(tbl);
  }

  // --- SOLVER (Greedy) ---
  // returns {allocations: [{teacher_id, class_id, subject_id, hours}], leftover: [{class_id,subject_id,hours}]}
  function solveGreedy(){
    // 1) Prepare copy of CSR demand
    const demand = {}; // demand[class][subject] = hours (remaining)
    store.csr.forEach(c => {
      if(!demand[c.class_id]) demand[c.class_id] = {};
      demand[c.class_id][c.subject_id] = Number(c.hours_per_week || 0);
    });

    // 2) Apply fixed assignments and subtract from demand; compute teacher remaining capacity
    const teacherRemaining = {}; // teacher_id -> remaining hours
    store.teachers.forEach(t => {
      // start with weekly_hours
      teacherRemaining[t.teacher_id] = Number(t.weekly_hours || 0);
    });

    // allocations array
    const allocations = [];

    // apply fixed assignments: if fixed.full then hours come from CSR; if not, use fixed.hours
    store.teachers.forEach(t => {
      (t.fixed || []).forEach(f => {
        const hours = Number(f.hours || 0);
        // Subtract from demand if exists
        if(demand[f.class_id] && demand[f.class_id][f.subject_id] !== undefined){
          // reduce demand by min(demand, hours)
          const before = demand[f.class_id][f.subject_id];
          const used = Math.min(before, hours);
          demand[f.class_id][f.subject_id] = +(before - used).toFixed(2);
          // if fixed asks for more than CSR, still allocate the fixed hours (solver trusts user's fixed)
          // we'll reduce teacher capacity by the full fixed hours (so teacherRemaining reflects real commitment)
        }
        // reduce teacher remaining by full fixed hours
        teacherRemaining[t.teacher_id] = +(teacherRemaining[t.teacher_id] - hours).toFixed(2);
        if(teacherRemaining[t.teacher_id] < 0) teacherRemaining[t.teacher_id] = +teacherRemaining[t.teacher_id].toFixed(2); // can be negative -> will be reported
        // record allocation for fixed
        allocations.push({teacher_id: t.teacher_id, class_id: f.class_id, subject_id: f.subject_id, hours: hours, fixed: true});
      });
    });

    // 3) Now greedily assign remaining demand
    // For deterministic behavior, iterate subjects × classes in order
    const step = 0.5; // granularity
    const teachersBySubject = {}; // subject -> list of teacher ids who can teach it
    store.teachers.forEach(t => {
      (t.subjects || []).forEach(sid => {
        if(!teachersBySubject[sid]) teachersBySubject[sid] = [];
        teachersBySubject[sid].push(t.teacher_id);
      });
    });

    // Helper: find teacher with remaining capacity > 0 who can teach subject
    function findTeacherForSubject(subject_id){
      const list = teachersBySubject[subject_id] || [];
      // choose teacher with largest remaining capacity (greedy heuristic)
      let best = null; let bestCap = -Infinity;
      list.forEach(tid => {
        const cap = teacherRemaining[tid] || 0;
        if(cap > bestCap) { best = tid; bestCap = cap; }
      });
      return best;
    }

    // iterate over subjects and classes
    store.subjects.forEach(s => {
      const sid = s.subject_id;
      store.classes.forEach(c => {
        const cid = c.class_id;
        let rem = (demand[cid] && demand[cid][sid] !== undefined) ? Number(demand[cid][sid]) : 0;
        rem = +rem.toFixed(2);
        while(rem >= (step - 1e-9)){
          const tid = findTeacherForSubject(sid);
          if(!tid) break; // no available teacher for this subject
          const cap = Math.max(0, teacherRemaining[tid]);
          if(cap < (step - 1e-9)) {
            // this teacher no longer useful — try to find other teacher: remove from subject mapping temporarily
            // simpler: mark teacherRemaining as 0 and continue
            teacherRemaining[tid] = 0;
            continue;
          }
          const allocate = Math.min(cap, rem);
          // round allocate down to nearest multiple of step
          const allocateRounded = Math.floor((allocate + 1e-9) / step) * step;
          if(allocateRounded <= 0) break;
          // record allocation
          allocations.push({teacher_id: tid, class_id: cid, subject_id: sid, hours: allocateRounded, fixed: false});
          // subtract
          rem = +(rem - allocateRounded).toFixed(2);
          demand[cid][sid] = rem;
          teacherRemaining[tid] = +(teacherRemaining[tid] - allocateRounded).toFixed(2);
        }
      });
    });

    // build leftover list
    const leftover = [];
    Object.keys(demand).forEach(cid => {
      Object.keys(demand[cid]).forEach(sid => {
        const h = Number(demand[cid][sid] || 0);
        if(h >= (step / 2)){ // notable leftover
          leftover.push({class_id: cid, subject_id: sid, hours: +(h).toFixed(2)});
        }
      });
    });

    return {allocations, leftover, teacherRemaining};
  }

  // render solver results as table
  function showSolverResults(res){
    const box = el('solverResults'); box.style.display='block'; box.innerHTML='';
    const title = document.createElement('div'); title.innerHTML = '<strong>Solver eredmény (Greedy)</strong>';
    box.appendChild(title);
    // allocations table
    const alloc = res.allocations || [];
    const tbl = document.createElement('table'); tbl.style.marginTop='8px';
    const thead = document.createElement('thead'); thead.innerHTML = '<tr><th>Tanár</th><th>Osztály</th><th>Tárgy</th><th>Óra</th><th>Fix</th></tr>';
    tbl.appendChild(thead);
    const tbody = document.createElement('tbody');
    alloc.forEach(a=>{
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${a.teacher_id}</td><td>${a.class_id}</td><td>${a.subject_id}</td><td>${(a.hours%1===0)?String(a.hours):String(a.hours.toFixed(1))}</td><td>${a.fixed? 'igen':'nem'}</td>`;
      tbody.appendChild(tr);
    });
    tbl.appendChild(tbody);
    box.appendChild(tbl);

    // leftover
    if(res.leftover && res.leftover.length>0){
      const warn = document.createElement('div'); warn.className='bad'; warn.style.marginTop='10px'; warn.textContent = 'FIGYELEM: van kielégítetlen igény — lásd alább.';
      box.appendChild(warn);
      const lt = document.createElement('table'); lt.style.marginTop='8px';
      lt.innerHTML = '<thead><tr><th>Osztály</th><th>Tárgy</th><th>Óra</th></tr></thead>';
      const lbody = document.createElement('tbody');
      res.leftover.forEach(l=>{
        const tr = document.createElement('tr'); tr.innerHTML = `<td>${l.class_id}</td><td>${l.subject_id}</td><td>${(l.hours%1===0)?String(l.hours):String(l.hours.toFixed(1))}</td>`; lbody.appendChild(tr);
      });
      lt.appendChild(lbody); box.appendChild(lt);
    } else {
      const ok = document.createElement('div'); ok.className='ok'; ok.style.marginTop='10px'; ok.textContent = 'Minden igényt sikerült kiosztani (a greedy algoritmus szerint).';
      box.appendChild(ok);
    }

    // show remaining teacher capacities
    const remTable = document.createElement('table'); remTable.style.marginTop='10px';
    remTable.innerHTML = '<thead><tr><th>Tanár</th><th>Maradó kapacitás</th></tr></thead>';
    const rb = document.createElement('tbody');
    Object.keys(res.teacherRemaining).forEach(tid=>{
      const tr = document.createElement('tr'); tr.innerHTML = `<td>${tid}</td><td>${(res.teacherRemaining[tid]%1===0)?String(res.teacherRemaining[tid]):String(res.teacherRemaining[tid].toFixed(1))}</td>`; rb.appendChild(tr);
    });
    remTable.appendChild(rb); box.appendChild(remTable);

    // offer export of allocations
    const btn = document.createElement('button'); btn.textContent = 'Export allocations (JSON)'; btn.style.marginTop='8px';
    btn.addEventListener('click', ()=> {
      const blob = new Blob([JSON.stringify(res.allocations, null, 2)], {type:'application/json'});
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'allocations.json'; a.click(); URL.revokeObjectURL(a.href);
    });
    box.appendChild(btn);
  }

  // --- Event bindings and IO (imports/exports) ---
  el('addSubjectBtn').addEventListener('click', ()=>{ const name=el('subjectName').value.trim(); if(!name){ alert('Adj meg nevet'); return; } store.subjects.push({subject_id: makeSubjectId(name), display_name: name}); el('subjectName').value=''; renderSubjects(); renderCSR(); renderTeachers(); renderSummary(); });
  el('exportSubjectsBtn').addEventListener('click', ()=>{ const blob=new Blob([JSON.stringify(store.subjects,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='subjects.json'; a.click(); });
  el('importSubjectsBtn').addEventListener('click', ()=> el('fileInputSubjects').click());
  el('fileInputSubjects').addEventListener('change', e=>{ const f=e.target.files && e.target.files[0]; e.target.value=''; if(!f) return; const r=new FileReader(); r.onload = ev => { try{ const parsed = JSON.parse(ev.target.result); if(!Array.isArray(parsed)){ alert('subjects.json: tömböt várunk'); return; } parsed.forEach(it=>{ if(typeof it==='string'){ const name = it.trim(); if(name) store.subjects.push({subject_id:makeSubjectId(name), display_name:name}); } else if(it && typeof it==='object'){ const name = (it.display_name||it.name||'').toString().trim(); const sid = (it.subject_id||it.id||'').toString().trim(); if(name){ const id = sid || makeSubjectId(name); store.subjects.push({subject_id:id, display_name:name}); } } }); renderSubjects(); renderCSR(); renderTeachers(); renderSummary(); alert('Import kész'); } catch(err){ alert('Hibás JSON: '+err.message); } }; r.readAsText(f,'utf-8'); });

  el('addClassBtn').addEventListener('click', ()=>{ const display = el('newClassDisplay').value.trim(); if(!display){ alert('Adj meg nevet'); return; } const id = sanitizeClassId(display); if(store.classes.some(c=>c.class_id.toUpperCase()===id.toUpperCase())){ alert('Ilyen osztály már van'); return; } store.classes.push({class_id:id, display_name:display, groups:[]}); el('newClassDisplay').value=''; renderClasses(); renderCSR(); renderSummary(); renderTeachers(); });

  el('addTeacherBtn').addEventListener('click', ()=>{ const name = el('teacherName').value.trim(); const hours = parseFloat(el('teacherHours').value||'0') || 0; if(!name){ alert('Adj meg nevet'); return; } const id = makeTeacherId(name); store.teachers.push({teacher_id:id, name, weekly_hours: hours, subjects: [], fixed: []}); el('teacherName').value=''; el('teacherHours').value=''; renderTeachers(); });
  el('exportTeachersBtn').addEventListener('click', ()=>{ const blob=new Blob([JSON.stringify(store.teachers,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='teachers.json'; a.click(); });
  el('importTeachersBtn').addEventListener('click', ()=> el('fileInputTeachers').click());
  el('fileInputTeachers').addEventListener('change', e=>{ const f=e.target.files && e.target.files[0]; e.target.value=''; if(!f) return; const r = new FileReader(); r.onload = ev => { try{ const parsed = JSON.parse(ev.target.result); if(!Array.isArray(parsed)){ alert('teachers.json: tömböt várunk'); return; } parsed.forEach(it=>{ if(it && (it.name || it.teacher_id)){ const name = it.name || it.teacher_id || 'Tanár'; let id = it.teacher_id || makeTeacherId(name); if(store.teachers.some(t=>t.teacher_id===id)){ let i=1; while(store.teachers.some(t=>t.teacher_id===`${id}_${i}`)) i++; id = `${id}_${i}`; } const weekly_hours = parseFloat(it.weekly_hours||it.hours||0) || 0; const subjects = Array.isArray(it.subjects) ? it.subjects.slice() : []; const fixed = Array.isArray(it.fixed) ? it.fixed.map(f=>({subject_id:f.subject_id,class_id:f.class_id,hours: parseFloat(f.hours||0)||0, full: !!f.full})) : []; store.teachers.push({teacher_id:id, name, weekly_hours, subjects, fixed}); } }); renderTeachers(); alert('Tanárok importálva'); } catch(err){ alert('Hibás JSON: ' + err.message); } }; r.readAsText(f,'utf-8'); });

  el('exportCsrBtn').addEventListener('click', ()=>{ const blob=new Blob([JSON.stringify(store.csr,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='csr.json'; a.click(); });
  el('importCsrBtn').addEventListener('click', ()=> el('fileInputCsr').click());
  el('fileInputCsr').addEventListener('change', e=>{ const f=e.target.files && e.target.files[0]; e.target.value=''; if(!f) return; const r=new FileReader(); r.onload = ev => { try{ const parsed = JSON.parse(ev.target.result); if(!Array.isArray(parsed)){ alert('csr.json: tömböt várunk'); return; } parsed.forEach(it=>{ if(it && it.class_id && it.subject_id){ const h = parseFloat(it.hours_per_week||it.hours||0) || 0; const idx = store.csr.findIndex(x=>x.class_id===it.class_id && x.subject_id===it.subject_id); if(idx>=0) store.csr[idx].hours_per_week = h; else store.csr.push({class_id: it.class_id, subject_id: it.subject_id, hours_per_week: h}); } }); renderCSR(); renderSummary(); renderTeachers(); alert('CSR import kész'); } catch(err){ alert('Hibás JSON: ' + err.message); } }; r.readAsText(f,'utf-8'); });

  // Solve button
  el('solveBtn').addEventListener('click', ()=>{
    const res = solveGreedy();
    showSolverResults(res);
  });

  // init
  initDefaultClasses();
  renderSubjects();
  renderClasses();
  renderTeachers();
  renderCSR();
  renderSummary();

  // expose for debugging
  window._TF_STORE = store;
  window._TF_SOLVE = solveGreedy;
});
</script>
</body>
</html>
