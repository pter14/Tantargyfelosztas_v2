<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Tantárgyfelosztás — Stabil verzió</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body{font-family:Arial,Helvetica,sans-serif;margin:18px;background:#f6f7fb;color:#111}
    .container{display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:1400px}
    .card{background:#fff;padding:14px;border-radius:8px;box-shadow:0 1px 6px rgba(0,0,0,0.06)}
    input,button,select,textarea{padding:8px;border-radius:6px;border:1px solid #ddd}
    button{cursor:pointer;background:#fff}
    .list{margin-top:12px}
    .item{display:flex;justify-content:space-between;align-items:center;padding:8px 6px;border-bottom:1px solid #f1f1f1}
    .muted{color:#666;font-size:0.95rem}
    .small{font-size:0.9rem;color:#666}
    table{border-collapse:collapse;width:100%}
    th,td{border:1px solid #eee;padding:6px;text-align:left;vertical-align:middle;word-break:break-word}
    .csr-wrapper{overflow:auto;border:1px solid #eef2f7;padding:6px;border-radius:6px}
    .csr-table{min-width:800px;border-collapse:collapse}
  </style>
</head>
<body>
  <h1>Tantárgyfelosztás — Stabil</h1>

  <div class="container">
    <div class="card" id="subjectsCard">
      <h3>Tantárgyak</h3>
      <div style="display:flex;gap:8px">
        <input id="subjectName" placeholder="Tantárgy neve (pl. Matematika)" />
        <button id="addSubjectBtn">+ Tantárgy</button>
      </div>
      <div style="margin-top:8px">
        <button id="exportSubjectsBtn">Export tantárgy</button>
        <button id="importSubjectsBtn">Import tantárgy</button>
        <input id="fileInputSubjects" type="file" accept=".json,application/json" style="display:none" />
      </div>
      <div id="subjectsList" class="list"></div>
    </div>

    <div class="card" id="classesCard">
      <h3>Osztályok</h3>
      <div style="display:flex;gap:8px">
        <input id="newClassDisplay" placeholder="Új osztály megnevezése (pl. 1.b)" />
        <button id="addClassBtn">+ Osztály</button>
      </div>
      <div id="classesList" class="list" style="margin-top:8px"></div>
    </div>

    <div class="card" id="teachersCard" style="grid-column:1 / span 2">
      <h3>Tanárok</h3>
      <div style="display:flex;gap:8px">
        <input id="teacherName" placeholder="Tanár neve (pl. Kovács Anna)" />
        <input id="teacherHours" placeholder="Heti óra" type="number" style="width:120px" />
        <button id="addTeacherBtn">+ Tanár</button>
      </div>
      <div style="margin-top:8px;display:flex;gap:8px">
        <button id="exportTeachersBtn">Export tanárok</button>
        <button id="importTeachersBtn">Import tanárok</button>
        <input id="fileInputTeachers" type="file" accept=".json,application/json" style="display:none" />
      </div>
      <div id="teachersList" class="list" style="margin-top:8px"></div>
    </div>

    <div class="card" style="grid-column:1 / -1">
      <h3>CSR (osztály × tantárgy)</h3>
      <div style="margin-top:6px;display:flex;gap:8px">
        <button id="exportCsrBtn">Export CSR</button>
        <button id="importCsrBtn">Import CSR</button>
        <input id="fileInputCsr" type="file" accept=".json,application/json" style="display:none" />
      </div>
      <div class="csr-wrapper" style="margin-top:8px">
        <table id="csrTable" class="csr-table"></table>
      </div>
      <div id="summaryBox" style="margin-top:8px"></div>
    </div>
  </div>

<script>
/* Stable single-file app: careful binding in DOMContentLoaded */
document.addEventListener('DOMContentLoaded', () => {
  // store
  const store = {
    subjects: [],
    classes: [],
    csr: [],
    teachers: []
  };

  // helpers
  const removeAccents = s => s.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  const makeSubjectId = name=>{
    const a = removeAccents(name).toLowerCase().replace(/[^a-z0-9]/g,'');
    let id = (a.slice(0,4) || a || 'sub');
    let i=1;
    while(store.subjects.some(s=>s.subject_id===id)){ id = `${id}_${i}`; i++; }
    return id;
  };
  const sanitizeClassId = display=>{
    let s = (display||'').trim();
    if(!s) return '';
    s = removeAccents(s).replace(/[.\s\-]+/g,'_').replace(/[^A-Za-z0-9_]/g,'').toUpperCase().replace(/^_+|_+$/g,'');
    s = s.replace(/_+/g,'_').replace(/([0-9])_([A-Za-z])/g, (m,p1,p2)=>p1+p2);
    return s || 'CLASS';
  };
  const makeTeacherId = name=>{
    const parts = (name||'').trim().split(/\s+/).filter(Boolean);
    let id = parts.map(p=>p[0].toUpperCase()).join('') || 'T';
    let i=1;
    while(store.teachers.some(t=>t.teacher_id===id)){ id = `${id}_${i}`; i++; }
    return id;
  };
  const el = id => document.getElementById(id);

  // initial classes
  function initDefaultClasses(){
    store.classes = [];
    for(let g=1; g<=8; g++){
      ['A','B'].forEach(s=> store.classes.push({class_id:`${g}${s}`, display_name:`${g}.${s.toLowerCase()}`, groups:[]}));
    }
    store.classes.push({class_id:'MAGANTANULO_1', display_name:'Magántanuló 1', groups:[]});
    store.classes.push({class_id:'MAGANTANULO_2', display_name:'Magántanuló 2', groups:[]});
  }

  // render functions (simple & robust)
  function renderSubjects(){
    const box = el('subjectsList'); box.innerHTML = '';
    if(store.subjects.length===0){ box.textContent = 'Nincsenek tantárgyak'; return; }
    store.subjects.forEach(s=>{
      const row = document.createElement('div'); row.className='item';
      row.innerHTML = `<div><strong>${s.display_name}</strong> <span class="muted">(${s.subject_id})</span></div>
                       <div><button data-id="${s.subject_id}" class="del-sub">Törlés</button></div>`;
      box.appendChild(row);
    });
    // bind deletes
    box.querySelectorAll('.del-sub').forEach(b => b.addEventListener('click', ev=>{
      const id = b.getAttribute('data-id');
      if(!confirm('Törlöd a tantárgyat?')) return;
      store.subjects = store.subjects.filter(x=>x.subject_id!==id);
      // also remove csr entries & teacher refs
      store.csr = store.csr.filter(x=>x.subject_id!==id);
      store.teachers.forEach(t=>{ t.subjects = (t.subjects||[]).filter(sid=>sid!==id); if(t.fixed) t.fixed = t.fixed.filter(f=>f.subject_id!==id); });
      renderSubjects(); renderCSR(); renderTeachers(); renderSummary();
    }) );
  }

  function renderClasses(){
    const box = el('classesList'); box.innerHTML = '';
    if(store.classes.length===0){ box.textContent='Nincsenek osztályok'; return; }
    store.classes.forEach(c=>{
      const row = document.createElement('div'); row.className='item';
      row.innerHTML = `<div><strong>${c.display_name}</strong> <span class="muted">(${c.class_id})</span></div>
                       <div><button data-id="${c.class_id}" class="del-class">Törlés</button></div>`;
      box.appendChild(row);
    });
    box.querySelectorAll('.del-class').forEach(b=> b.addEventListener('click', ev=>{
      const id = b.getAttribute('data-id');
      if(!confirm('Törlöd az osztályt?')) return;
      store.classes = store.classes.filter(x=>x.class_id!==id);
      store.csr = store.csr.filter(x=>x.class_id!==id);
      // remove fixed refs
      store.teachers.forEach(t=>{ if(t.fixed) t.fixed = t.fixed.filter(f=>f.class_id !== id); });
      renderClasses(); renderCSR(); renderTeachers(); renderSummary();
    }));
  }

  function renderTeachers(){
    const box = el('teachersList'); box.innerHTML = '';
    if(store.teachers.length===0){ box.textContent='Nincsenek tanárok'; return; }
    store.teachers.forEach(t=>{
      const row = document.createElement('div'); row.className='item';
      const rightHtml = `<div>
        <button data-id="${t.teacher_id}" class="del-teacher">Törlés</button>
      </div>`;
      row.innerHTML = `<div><strong>${t.teacher_id}</strong> — ${t.name} <span class="muted">(${t.weekly_hours} óra)</span></div>${rightHtml}`;
      box.appendChild(row);
    });
    box.querySelectorAll('.del-teacher').forEach(b=> b.addEventListener('click', ev=>{
      const id = b.getAttribute('data-id'); if(!confirm('Törlöd a tanárt?')) return;
      store.teachers = store.teachers.filter(x=>x.teacher_id!==id);
      renderTeachers();
    }));
  }

  // CSR render (table with inputs) — stable binding
  function renderCSR(){
    const table = el('csrTable');
    if(store.classes.length===0 || store.subjects.length===0){ table.innerHTML = '<tr><td>Adj meg osztályokat és tantárgyakat</td></tr>'; return; }
    // header
    let html = '<thead><tr><th></th>';
    store.classes.forEach(c => html += `<th>${c.class_id}</th>`);
    html += '</tr></thead><tbody>';
    store.subjects.forEach(s=>{
      html += `<tr><th>${s.display_name} (${s.subject_id})</th>`;
      store.classes.forEach(c=>{
        const rec = store.csr.find(x=>x.class_id===c.class_id && x.subject_id===s.subject_id);
        const v = rec ? Number(rec.hours_per_week||0) : 0;
        html += `<td><input type="number" step="0.5" min="0" data-class="${c.class_id}" data-sub="${s.subject_id}" value="${v}" style="width:80px" /></td>`;
      });
      html += '</tr>';
    });
    html += '</tbody>';
    table.innerHTML = html;
    // attach handlers
    table.querySelectorAll('input[data-class]').forEach(inp=>{
      inp.addEventListener('change', e=>{
        const class_id = inp.getAttribute('data-class');
        const subject_id = inp.getAttribute('data-sub');
        const val = parseFloat(inp.value || '0') || 0;
        const idx = store.csr.findIndex(x=>x.class_id===class_id && x.subject_id===subject_id);
        if(idx>=0) store.csr[idx].hours_per_week = val;
        else store.csr.push({class_id, subject_id, hours_per_week: val});
        renderSummary();
      });
    });
  }

  function renderSummary(){
    const box = el('summaryBox'); box.innerHTML = '';
    if(store.classes.length===0 || store.subjects.length===0){ box.textContent='Nincsenek adatok összegzéshez'; return; }
    const tbl = document.createElement('table');
    // header: empty + classes + total
    const thead = document.createElement('thead');
    const tr = document.createElement('tr');
    tr.appendChild(document.createElement('th'));
    store.classes.forEach(c=>{ const th = document.createElement('th'); th.textContent = c.class_id; tr.appendChild(th); });
    const thTotal = document.createElement('th'); thTotal.textContent='Összes'; tr.appendChild(thTotal);
    thead.appendChild(tr); tbl.appendChild(thead);
    const tbody = document.createElement('tbody');
    store.subjects.forEach(s=>{
      const trr = document.createElement('tr');
      const th = document.createElement('th'); th.textContent = `${s.display_name} (${s.subject_id})`; trr.appendChild(th);
      let sum = 0;
      store.classes.forEach(c=>{
        const td = document.createElement('td');
        const rec = store.csr.find(x=>x.class_id===c.class_id && x.subject_id===s.subject_id);
        const val = rec ? Number(rec.hours_per_week||0) : 0;
        sum += val;
        td.textContent = (val % 1 === 0) ? String(val) : String(val.toFixed(1));
        trr.appendChild(td);
      });
      const tdSum = document.createElement('td'); tdSum.textContent = (sum % 1 === 0) ? String(sum) : String(sum.toFixed(1));
      trr.appendChild(tdSum);
      tbody.appendChild(trr);
    });
    tbl.appendChild(tbody); box.appendChild(tbl);
  }

  // Actions
  // Subjects add/export/import
  el('addSubjectBtn').addEventListener('click', ()=>{
    const name = el('subjectName').value.trim();
    if(!name){ alert('Adj meg nevet'); return; }
    const id = makeSubjectId(name);
    store.subjects.push({subject_id:id, display_name:name});
    el('subjectName').value = '';
    renderSubjects(); renderCSR(); renderSummary();
  });
  el('exportSubjectsBtn').addEventListener('click', ()=>{
    const blob = new Blob([JSON.stringify(store.subjects,null,2)], {type:'application/json'}); const url = URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download='subjects.json'; a.click(); URL.revokeObjectURL(url);
  });
  el('importSubjectsBtn').addEventListener('click', ()=> el('fileInputSubjects').click());
  el('fileInputSubjects').addEventListener('change', e=>{
    const f = e.target.files && e.target.files[0]; e.target.value=''; if(!f) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const parsed = JSON.parse(ev.target.result);
        if(!Array.isArray(parsed)){ alert('A subjects.json-nek tömböt kell tartalmaznia'); return; }
        // simple normalization: strings or objects with display_name/subject_id
        parsed.forEach(it=>{
          if(typeof it === 'string'){ const name=it.trim(); if(name) store.subjects.push({subject_id: makeSubjectId(name), display_name:name}); }
          else if(it && typeof it==='object'){
            const name = (it.display_name || it.name || '').toString().trim();
            const sid = (it.subject_id || it.id || '').toString().trim();
            if(name){ const id = sid || makeSubjectId(name); store.subjects.push({subject_id:id, display_name:name}); }
          }
        });
        renderSubjects(); renderCSR(); renderSummary();
        alert('Import kész');
      } catch(err){
        alert('Hibás JSON: ' + err.message);
      }
    };
    reader.onerror = ()=> alert('Fájl beolvasási hiba'); reader.readAsText(f,'utf-8');
  });

  // Classes add
  el('addClassBtn').addEventListener('click', ()=>{
    const display = el('newClassDisplay').value.trim();
    if(!display){ alert('Adj meg nevet'); return; }
    const id = sanitizeClassId(display);
    if(store.classes.some(c=>c.class_id.toUpperCase()===id.toUpperCase())){ alert('Már létezik ilyen osztály'); return; }
    store.classes.push({class_id:id, display_name:display, groups:[]});
    el('newClassDisplay').value='';
    renderClasses(); renderCSR(); renderSummary();
  });

  // Teachers add/export/import
  el('addTeacherBtn').addEventListener('click', ()=>{
    const name = el('teacherName').value.trim();
    const hours = parseFloat(el('teacherHours').value||'0') || 0;
    if(!name){ alert('Adj meg nevet'); return; }
    const id = makeTeacherId(name);
    store.teachers.push({teacher_id:id, name, weekly_hours: hours, subjects: [], fixed: []});
    el('teacherName').value=''; el('teacherHours').value='';
    renderTeachers();
  });
  el('exportTeachersBtn').addEventListener('click', ()=>{
    const blob = new Blob([JSON.stringify(store.teachers,null,2)], {type:'application/json'}); const url = URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download='teachers.json'; a.click(); URL.revokeObjectURL(url);
  });
  el('importTeachersBtn').addEventListener('click', ()=> el('fileInputTeachers').click());
  el('fileInputTeachers').addEventListener('change', e=>{
    const f = e.target.files && e.target.files[0]; e.target.value=''; if(!f) return;
    const reader = new FileReader();
    reader.onload = ev=>{
      try {
        const parsed = JSON.parse(ev.target.result);
        if(!Array.isArray(parsed)){ alert('A teachers.json-nek tömböt kell tartalmaznia'); return; }
        parsed.forEach(it=>{
          if(it && (it.name || it.teacher_id)){
            const name = it.name || it.teacher_id || 'Tanár';
            let id = it.teacher_id || makeTeacherId(name);
            // avoid collision
            if(store.teachers.some(t=>t.teacher_id===id)){ let i=1; while(store.teachers.some(t=>t.teacher_id===`${id}_${i}`)) i++; id = `${id}_${i}`; }
            const weekly_hours = parseFloat(it.weekly_hours||it.hours||0) || 0;
            const subjects = Array.isArray(it.subjects) ? it.subjects.slice() : [];
            const fixed = Array.isArray(it.fixed) ? it.fixed.map(f=>({subject_id:f.subject_id, class_id:f.class_id, hours:parseFloat(f.hours||0)||0, full:!!f.full})) : [];
            store.teachers.push({teacher_id:id, name, weekly_hours, subjects, fixed});
          }
        });
        renderTeachers(); alert('Tanár import kész');
      } catch(err){ alert('Hibás JSON: '+err.message); }
    };
    reader.onerror = ()=> alert('Fájl beolvasási hiba'); reader.readAsText(f,'utf-8');
  });

  // CSR export/import
  el('exportCsrBtn').addEventListener('click', ()=>{
    const blob = new Blob([JSON.stringify(store.csr,null,2)], {type:'application/json'}); const url = URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download='csr.json'; a.click(); URL.revokeObjectURL(url);
  });
  el('importCsrBtn').addEventListener('click', ()=> el('fileInputCsr').click());
  el('fileInputCsr').addEventListener('change', e=>{
    const f = e.target.files && e.target.files[0]; e.target.value=''; if(!f) return;
    const reader = new FileReader();
    reader.onload = ev=>{
      try {
        const parsed = JSON.parse(ev.target.result);
        if(!Array.isArray(parsed)){ alert('CSR JSON-nek tömböt kell tartalmaznia'); return; }
        parsed.forEach(it=>{
          if(it && it.class_id && it.subject_id){
            const h = parseFloat(it.hours_per_week||0) || 0;
            const idx = store.csr.findIndex(x=>x.class_id===it.class_id && x.subject_id===it.subject_id);
            if(idx>=0) store.csr[idx].hours_per_week = h;
            else store.csr.push({class_id: it.class_id, subject_id: it.subject_id, hours_per_week: h});
          }
        });
        renderCSR(); renderSummary(); alert('CSR import kész');
      } catch(err){ alert('Hibás JSON: '+err.message); }
    };
    reader.onerror = ()=> alert('Fájl beolvasási hiba'); reader.readAsText(f,'utf-8');
  });

  // init default and initial render
  initDefaultClasses();
  renderSubjects();
  renderClasses();
  renderTeachers();
  renderCSR();
  renderSummary();

  // expose store for debugging (optional)
  window._TF_STORE = store;
}); // DOMContentLoaded end
</script>
</body>
</html>
